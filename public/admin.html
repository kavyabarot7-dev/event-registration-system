<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        table {
            width: 95%;
            margin: 30px auto;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: rgba(59,130,246,0.5);
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(59,130,246,0.2);
        }
    </style>
</head>

<body>

<h2>📊 Admin Dashboard - All Registrations</h2>
<button onclick="goToHome()" style="margin:20px;">
    🔙 Back to Registration
</button>
<table id="table">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Enrollment</th>
        <th>Branch</th>
        <th>Contact</th>
        <th>Email</th>
        <th>Event</th>
    </tr>
</table>

<script>
async function loadData() {
    try {
        const res = await fetch("/registrations");
        const data = await res.json();

        console.log("Data from server:", data); // DEBUG

        const table = document.getElementById("table");

        // Clear old rows except header
        table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Enrollment</th>
            <th>Branch</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Event</th>
        </tr>
        `;

        if (data.length === 0) {
            const row = table.insertRow();
            const cell = row.insertCell(0);
            cell.colSpan = 7;
            cell.innerText = "No registrations found";
            return;
        }

        data.forEach(item => {
            const row = table.insertRow();

            row.insertCell(0).innerText = item.id || "-";
            row.insertCell(1).innerText = item.name || "-";
            row.insertCell(2).innerText = item.enrollment_number || "-";
            row.insertCell(3).innerText = item.branch || "-";
            row.insertCell(4).innerText = item.contact_number || "-";
            row.insertCell(5).innerText = item.email || "-";
            row.insertCell(6).innerText = item.event || "-";
        });

    } catch (error) {
        console.error("Error fetching data:", error);
        alert("Error loading data. Check server.");
    }
}

loadData();
</script>
<script>
function goToHome() {
    window.location.href = "index.html";
}
</script>
</body>
</html>
